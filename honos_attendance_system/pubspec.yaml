name: honos_attendance_system
description: Honos Attendance System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  geolocator: ^11.0.0
  permission_handler: ^11.3.1
  camera: ^0.10.5+9
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  http: ^1.2.1
  google_fonts: ^6.2.1
  uuid: 4.4.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  path: ^1.9.0
  cupertino_icons: ^1.0.6
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  url_launcher: ^6.3.1
  flutter_background_service: ^5.0.7
  flutter_local_notifications: ^17.2.2
  tflite_flutter: ^0.12.1
  image: ^4.1.7
  google_mlkit_face_detection: ^0.13.2
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo.png
    - assets/models/
